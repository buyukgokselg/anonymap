services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsecity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulsecity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pulsecity-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pulsecity-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - pulsecity-redis:/data

volumes:
  pulsecity-postgres:
  pulsecity-redis:
